name: Test Helm Chart
description: Test the chart is installable
inputs:
  chart:
    required: true
  node-image:
    required: true
  build-images:
    default: 'true'
  docker-cache-dir:
    required: false
runs:
  using: "composite"
  steps:
    - name: Setup kind
      uses: ./.github/actions/setup-kind
      with:
        node-image: '${{ inputs.node-image }}'
    - name: Cache docker local
      id: cache-docker-local
      uses: ./.github/actions/cache-docker-local
      with:
        path: ${{ inputs.docker-cache-dir }}
        restore-only: true
      if: ${{ inputs.docker-cache-dir != '' }}
    - name: Setup buildx
      uses: ./.github/actions/setup-buildx
      if: ${{ inputs.build-images == 'true' }}
    - name: Build images
      shell: bash
      run: make docker-build
      env:
        DOCKER_CACHE_READONLY: "true"
      if: ${{ inputs.build-images == 'true' }}
    - name: Test chart
      shell: bash
      run: ./hack/tools.sh helm install -n k8s-job-wrapper-system --create-namespace k8s-job-wrapper $chart --wait --timeout=5m
      env:
        chart: ${{ inputs.chart }}
    - name: Apply samples
      shell: bash
      run: ./hack/tools.sh kubectl apply -k config/samples
    - name: Wait until the Job is complete
      shell: bash
      run: |
        ./hack/tools.sh kubectl wait --for=condition=Available jobs.pixiv.net job-sample --timeout=1m
        ./hack/tools.sh kubectl wait --for=condition=Complete job -l jobs.pixiv.net/name=job-sample --timeout=2m
