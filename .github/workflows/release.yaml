name: Release
permissions: {}
on:
  push:
    tags:
      - 'v*'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  init:
    name: Init release
    outputs:
      prerelease: ${{ steps.check.outputs.prerelease }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: "false"
      - name: Setup common
        uses: ./.github/actions/common
      - name: Set version
        id: version
        run: |
          echo "version=$(./hack/version.sh)" >> $GITHUB_OUTPUT
      - name: Check prerelease
        id: check
        run: |
          if echo "$GITHUB_REF_NAME" | grep -q -E '^v[0-9]+\.[0-9]+\.[0-9]+$' ; then
            echo "latest=true" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "latest=false" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Build container image and publish on push tag
    needs:
      - init
    permissions:
      packages: write # for ghcr
      contents: read
      id-token: write # needed for signing the images with GitHub OIDC Token
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: "false"
      - name: Setup common
        uses: ./.github/actions/common
      - name: Login to ghcr
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup buildx
        uses: ./.github/actions/setup-buildx
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Build and push
        uses: ./.github/actions/build-and-push
        with:
          version: v${{ needs.init.outputs.version }}
          arch: ${{ matrix.arch }}

  merge-images:
    needs:
      - init
      - publish
    permissions:
      contents: read
      packages: write # for ghcr
      id-token: write # needed for signing the images with GitHub OIDC Token
    timeout-minutes: 30
    name: Merge images
    outputs:
      tag: ${{ steps.create-manifest.outputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup common
        uses: ./.github/actions/common
      - name: Login to ghcr
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup buildx
        uses: ./.github/actions/setup-buildx
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Create manifest
        id: create-manifest
        env:
          tag: "v${{ needs.init.outputs.version }}"
        run: |
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          image_name="${{ env.IMAGE_REGISTRY }}"
          image="${image_name}:${tag}"
          docker buildx imagetools create -t "$image" "${image}-arm64" "${image}-amd64"
          get_digest() {
            docker buildx imagetools inspect "$image" --format='{{json .Manifest.Digest}}' | tr -d '"'
          }
          digest="$(get_digest)"
          cosign sign --yes "${image_name}@${digest}"

  generate:
    name: Generate chart package
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - init
      - merge-images
    outputs:
      chart-package-file: ${{ steps.generate-chart.outputs.chart-package-file }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: "false"
      - name: Setup common
        uses: ./.github/actions/common
      - name: Setup go
        uses: ./.github/actions/setup-go
        with:
          cache: false
      - name: Generate chart
        id: generate-chart
        env:
          CHART_VERSION: ${{ needs.init.outputs.version }}
          IMAGE_TAG: ${{ needs.merge-images.outputs.tag }}
        run: |
          ./hack/chart/make.sh "$CHART_VERSION" "$IMAGE_REGISTRY" "$IMAGE_TAG" "$CHART_PACKAGE_DIR"
          if ! git diff --exit-code ; then
            echo "Aborting the release because a diff was detected in the chart."
            exit 1
          fi
          name="k8s-job-wrapper-${CHART_VERSION}.tgz"
          echo "chart-package-file=${name}" >> "$GITHUB_OUTPUT"
          echo "chart-package-path=${CHART_PACKAGE_DIR}/${name}" >> "$GITHUB_OUTPUT"
      - name: Test chart
        uses: ./.github/actions/test-chart
        with:
          chart: '${{ steps.generate-chart.outputs.chart-package-path }}'
          node-image: '${{ env.KIND_NODE_IMAGE }}'
          build-image: false
      - name: Upload chart package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: chart-package
          path: ${{ steps.generate-chart.outputs.chart-package-path }}
          retention-days: 1

  release:
    name: Release chart on push tag
    permissions:
      packages: write # for ghcr
      contents: write # for github release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - init
      - merge-images
      - generate
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: "false"
          fetch-depth: 0
      - name: Setup common
        uses: ./.github/actions/common
      - name: Download chart package
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: chart-package
      - name: Login to ghcr
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push chart
        env:
          CHART_PACKAGE_FILE: ${{ needs.generate.outputs.chart-package-file }}
        run: |
          ./hack/tools.sh helm push "$CHART_PACKAGE_FILE" "oci://ghcr.io/pixiv/k8s-job-wrapper/charts"
      - name: Create release
        run: |
          extra_args=""
          if [ "$PRERELEASE" = "true" ] ; then
            extra_args="${extra_args} --prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes $extra_args "$CHART_PACKAGE_FILE" "$TRANSFORMER"
        env:
          GH_TOKEN: ${{ github.token }}
          CHART_PACKAGE_FILE: ${{ needs.generate.outputs.chart-package-file }}
          TRANSFORMER: hack/docs/kustomize/transform.yaml
          PRERELEASE: ${{ needs.init.outputs.prerelease }}

  pages:
    name: Deploy CRD document
    if: ${{ needs.init.outputs.prerelease != 'true' }}
    permissions:
      pages: write
      id-token: write # to verify deployment
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - init
      - release
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: "false"
      - name: Setup common
        uses: ./.github/actions/common
      - name: Generate CRD document
        id: generate-docs
        run: |
          make pages
          echo "docs-package-path=${CRD_DOCS_DIR}" >> "$GITHUB_OUTPUT"
      - name: Upload CRD document
        id: upload
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ${{ steps.generate-docs.outputs.docs-package-path }}/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
