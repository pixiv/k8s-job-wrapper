name: Test chart
permissions: {}
on:
  pull_request:
  push:
    branches:
      - 'main'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Test chart
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
      - name: Setup common
        uses: ./.github/actions/common
      - name: Test chart
        uses: ./.github/actions/test-chart
        with:
          chart: ./charts/k8s-job-wrapper
          node-image: '${{ env.KIND_NODE_IMAGE }}'
          docker-cache-dir: '${{ env.DOCKER_CACHE_DIR }}'
