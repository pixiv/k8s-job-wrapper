apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-job-wrapper.fullname" . }}-podprofile-admin-role
  labels:
  {{- include "k8s-job-wrapper.labels" . | nindent 4 }}
rules:
- apiGroups:
  - pixiv.net
  resources:
  - podprofiles
  verbs:
  - '*'
- apiGroups:
  - pixiv.net
  resources:
  - podprofiles/status
  verbs:
  - get
